<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Sfondo circolare -->
  <circle cx="50" cy="50" r="48" fill="#0d0d1a" stroke="#2e2e50" stroke-width="2"/>

  <!-- Mantello verde bosco (parte posteriore) -->
  <ellipse cx="50" cy="40" rx="24" ry="27" fill="#1a2e1a"/>
  <path d="M26 56 Q20 72 28 84 Q50 96 72 84 Q80 72 74 56 Z" fill="#1a2e1a"/>

  <!-- Corona di foglie sulla testa -->
  <!-- Foglie a ventaglio -->
  <ellipse cx="34" cy="20" rx="5" ry="9" fill="#2d6a4f" transform="rotate(-30 34 20)"/>
  <ellipse cx="42" cy="14" rx="5" ry="10" fill="#40916c" transform="rotate(-10 42 14)"/>
  <ellipse cx="50" cy="12" rx="5" ry="11" fill="#52b788"/>
  <ellipse cx="58" cy="14" rx="5" ry="10" fill="#40916c" transform="rotate(10 58 14)"/>
  <ellipse cx="66" cy="20" rx="5" ry="9" fill="#2d6a4f" transform="rotate(30 66 20)"/>
  <!-- Base corona -->
  <rect x="32" y="22" width="36" height="6" rx="3" fill="#1e3a1e" stroke="#52b788" stroke-width="0.8"/>

  <!-- Viso sotto la corona -->
  <ellipse cx="50" cy="42" rx="15" ry="13" fill="#111a11"/>

  <!-- Occhi (verde brillante) -->
  <ellipse cx="44" cy="40" rx="3" ry="2.5" fill="#52b788" opacity="0.95"/>
  <ellipse cx="56" cy="40" rx="3" ry="2.5" fill="#52b788" opacity="0.95"/>
  <ellipse cx="44" cy="40" rx="1.5" ry="1.5" fill="#0d0d1a"/>
  <ellipse cx="56" cy="40" rx="1.5" ry="1.5" fill="#0d0d1a"/>
  <circle cx="44.8" cy="39" r="0.7" fill="white" opacity="0.7"/>
  <circle cx="56.8" cy="39" r="0.7" fill="white" opacity="0.7"/>

  <!-- Viso — barba muschio -->
  <path d="M38 47 Q50 53 62 47 L60 50 Q50 58 40 50 Z" fill="#1e3a1e" opacity="0.7"/>

  <!-- Bordo mantello (verde) -->
  <path d="M26 40 Q50 28 74 40" fill="none" stroke="#52b788" stroke-width="1.2" opacity="0.6"/>

  <!-- Spalle mantello -->
  <path d="M28 54 Q20 64 24 78 Q32 90 40 88" fill="none" stroke="#1a2e1a" stroke-width="8" stroke-linecap="round"/>
  <path d="M72 54 Q80 64 76 78 Q68 90 60 88" fill="none" stroke="#1a2e1a" stroke-width="8" stroke-linecap="round"/>

  <!-- Bastone nodoso (lato destro) -->
  <path d="M72 52 Q75 60 73 70 Q71 80 74 88" stroke="#5d4037" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Nodo in cima -->
  <circle cx="72" cy="51" r="4" fill="#3a2310" stroke="#52b788" stroke-width="1"/>
  <!-- Foglioline sul bastone -->
  <ellipse cx="76" cy="57" rx="4" ry="2" fill="#40916c" transform="rotate(20 76 57)"/>
  <ellipse cx="70" cy="64" rx="4" ry="2" fill="#52b788" transform="rotate(-15 70 64)"/>

  <!-- Gemma sul petto (pietra verde) -->
  <circle cx="50" cy="60" r="3.5" fill="#1a2e1a" stroke="#52b788" stroke-width="1.2"/>
  <circle cx="50" cy="60" r="2" fill="#40916c" opacity="0.9"/>
  <circle cx="49.2" cy="59" r="0.8" fill="white" opacity="0.5"/>

  <!-- Alone verde -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="#52b788" stroke-width="0.5" opacity="0.3"/>
</svg>
